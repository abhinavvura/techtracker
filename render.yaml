services:
  - type: web
    name: techtracker
    runtime: python
    buildCommand: pip install -r requirements.txt && python init_db.py
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: techtracker-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      - key: GMAIL_REFRESH_TOKEN
        sync: false
      - key: LINKEDIN_EMAIL
        sync: false
      - key: LINKEDIN_PASSWORD
        sync: false
      - key: LINKEDIN_LI_AT
        sync: false
      - key: LINKEDIN_JSESSIONID
        sync: false
      - key: LINKEDIN_ACCESS_TOKEN
        sync: false
      - key: MCP_SERVER_URL
        value: http://localhost:8002/mcp

databases:
  - name: techtracker-db
    databaseName: techtracker
    user: techtracker
    plan: free
